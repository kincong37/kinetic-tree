<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Kinetic Structure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400;500&display=swap');

        :root {
            --bg-color: rgb(243, 240, 230);
            --text-color: #050505;
            --accent-color: #ff4500;
            --border-color: rgba(0, 0, 0, 0.08);
            --text-muted: #7c7c7c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', 'PingFang SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 全局框架 */
        .page-wrapper {
            position: relative;
            z-index: 2;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 80px 1fr 100px;
        }

        /* --- 左侧边栏 --- */
        .sidebar {
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
            justify-content: space-between;
            user-select: none;
        }

        /* 笑脸区域容器 */
        .smiley-container {
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }

        .menu-btn-smiley {
            font-size: 24px;
            line-height: 1;
            font-weight: 300;
            color: var(--text-color);
        }

        /* 新增：打招呼 hi~ 的克制动效设计 */
        .greeting-text {
            font-size: 11px;
            font-weight: 400;
            color: var(--accent-color);
            white-space: nowrap;
            opacity: 0;
            animation: greetingLoop 6s infinite ease-in-out;
        }

        /* 呼吸隐藏循环动效 */
        @keyframes greetingLoop {
            0%, 100% { opacity: 0; transform: translateX(-4px); }
            10%, 40% { opacity: 1; transform: translateX(0px); }
            50%, 95% { opacity: 0; transform: translateX(2px); }
        }

        .nav-dots {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        /* 纯静态 UI 装饰点 */
        .dot {
            width: 8px;
            height: 8px;
            border: 1px solid #999;
            border-radius: 50%;
        }

        .dot.active {
            border-color: var(--text-color);
            background-color: var(--text-color);
        }

        /* --- 主内容区 --- */
        .main-container {
            display: grid;
            grid-template-rows: auto 1fr 140px;
            border-right: 1px solid var(--border-color);
            overflow: hidden;
        }

        .hero-header {
            padding: 60px 80px 40px 80px;
            user-select: none;
        }

        .tag-product {
            display: inline-flex;
            align-items: center;
            background: #000;
            color: #fff;
            font-size: 11px;
            padding: 4px 8px;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tag-product .orange-box {
            color: var(--accent-color);
            font-weight: bold;
        }

        .main-title {
            font-size: 68px;
            font-weight: 400;
            line-height: 1.05;
            letter-spacing: -2px;
        }

        /* 核心展示区 */
        .center-stage {
            display: grid;
            grid-template-columns: 420px 1fr;
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        /* 左侧文案细化 */
        .info-panel {
            padding: 0 0 40px 80px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            height: 100%;
            min-width: 380px;
        }

        .info-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 80px;
            width: 12px;
            height: 12px;
            background-color: var(--accent-color);
        }

        .deploy-text {
            font-size: 15px;
            color: var(--text-color);
            margin-top: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            width: 85%;
            line-height: 1.4;
            user-select: none;
        }

        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            user-select: none;
        }

        .feature-item {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.04);
            padding: 4px 10px;
            width: max-content;
            color: #333;
        }

        /* 交互提示器 */
        .interaction-hint-box {
            margin-top: 10px;
            border: 1px dashed rgba(0, 0, 0, 0.15);
            width: 85%;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            user-select: none;
        }

        .hint-status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: hintPulse 2s infinite ease-in-out;
        }

        .interaction-hint-box.active {
            border-color: var(--accent-color);
            color: var(--text-color);
            background-color: rgba(255, 69, 0, 0.03);
        }
        .interaction-hint-box.active .hint-status-dot {
            background-color: var(--accent-color);
            animation: none;
        }

        /* 最底部签名 */
        .css-signature {
            margin-top: auto; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 400;
            color: #414146;
            letter-spacing: -0.5px;
            user-select: none;
            pointer-events: none;
        }

        @keyframes hintPulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* 【保留交互】p5.js Canvas 挂载容器 */
        .canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: crosshair;
        }

        /* --- 底部极细浅色网格区 --- */
        .footer-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 60px 40px 80px;
            position: relative;
            background-image: 
                linear-gradient(to right, rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 8px 8px;
            border-top: 1px solid var(--border-color);
            user-select: none;
        }

        .branding-logo {
            font-size: 28px;
            font-weight: 100;
            letter-spacing: 14px;
            color: rgba(0, 0, 0, 0.08);
            line-height: 1;
        }

        /* 【保留交互】Trigger Velocity 触发按钮 */
        .btn-get-started {
            background: #000;
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s ease;
        }

        .btn-get-started:hover {
            background: #222;
        }

        /* --- 右侧悬浮图标区 --- */
        .right-edge {
            position: relative;
            user-select: none;
        }

        /* 纯展示静态标签 */
        .arrow-indicator {
            position: absolute;
            bottom: 140px; 
            left: -25px;
            width: 50px;
            height: 50px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-muted);
        }

        /* 📱 移动端自适应与高度防裁剪 */
        @media (max-width: 900px) {
            body {
                overflow-y: auto; 
            }
            .page-wrapper {
                grid-template-columns: 1fr; 
                height: auto;
                min-height: 100vh;
            }
            .sidebar, .right-edge {
                display: none; 
            }
            .main-container {
                grid-template-rows: auto auto auto; 
                border-right: none;
                height: auto;
                min-height: 100vh;
            }
            .hero-header {
                padding: 30px 24px 10px 24px;
            }
            .main-title {
                font-size: 34px; 
            }
            .center-stage {
                grid-template-columns: 1fr; 
                grid-template-rows: auto auto;
                height: auto;
                overflow: visible;
            }
            .info-panel {
                padding: 0 24px 15px 24px;
                min-width: 100%;
                height: auto;
                gap: 16px;
            }
            .info-panel::before {
                left: 24px;
            }
            .deploy-text {
                margin-top: 5px;
                width: 100%;
            }
            .interaction-hint-box {
                width: 100%;
            }
            .css-signature {
                margin-top: 10px; 
            }
            
            .canvas-container {
                width: 100% !important;
                height: 60vh !important; 
                min-height: 420px; 
                max-height: 600px;
                overflow: hidden;
            }
            
            .footer-area {
                padding: 24px;
                height: auto;
                align-items: center;
            }
            .branding-logo {
                font-size: 14px; 
                letter-spacing: 3px;
            }
            .btn-get-started {
                padding: 10px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <aside class="sidebar">
            <div class="smiley-container">
                <div class="menu-btn-smiley">⍨</div>
                <div class="greeting-text">hi~</div>
            </div>
            <div class="nav-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div></div>
        </aside>

        <main class="main-container">
            
            <header class="hero-header">
                <div class="tag-product">
                    <span class="orange-box">#01</span> KINETIC SYSTEM <span>+</span>
                </div>
                <h1 class="main-title">Dynamic Kinetic<br>Structure</h1>
            </header>

            <section class="center-stage">
                <div class="info-panel">
                    <p class="deploy-text">Interactive curve generative structure via curve-matched physics algorithm.</p>
                    <ul class="feature-list">
                        <li class="feature-item"><span>↗</span> Per-Layer Curve Calibrated</li>
                        <li class="feature-item"><span>↗</span> Decoupled Motion Control</li>
                        <li class="feature-item"><span>↗</span> Drag-Accelerated Kinetic Flow</li>
                    </ul>

                    <div class="interaction-hint-box" id="ui-hint-box">
                        <div class="hint-status-dot"></div>
                        <span id="ui-hint-text">[ 提示: 长按鼠标/触摸屏幕以激活加速旋转 ]</span>
                    </div>

                    <div class="css-signature">From Fang.</div>
                </div>

                <div class="canvas-container" id="canvas-holder"></div>
            </section>

            <footer class="footer-area">
                <div class="branding-logo">PER-LAYER CREATIVE</div>
                <button class="btn-get-started" id="btn-trigger">
                    Trigger Velocity <span>▱</span>
                </button>
            </footer>

        </main>

        <div class="right-edge">
            <div class="arrow-indicator">↓</div>
        </div>

    </div>

    <script>
        let treeLayers = [];
        let particles = []; 

        let angle = 0;          
        let angleVel = 0;       
        let maxVel = 0.06;      
        let friction = 0.96;    
        let dynamicBend = 0;    

        let hintBox, hintText, triggerBtn;
        let isButtonPressedMode = false; // 用于判定是否按下了按钮触发加速

        function setup() {
            hintBox = document.getElementById('ui-hint-box');
            hintText = document.getElementById('ui-hint-text');
            triggerBtn = document.getElementById('btn-trigger');

            // 按钮事件绑定：点击或长按 Trigger 按钮同样可以驱动旋转
            if(triggerBtn) {
                triggerBtn.addEventListener('mousedown', () => { isButtonPressedMode = true; });
                triggerBtn.addEventListener('mouseup', () => { isButtonPressedMode = false; });
                triggerBtn.addEventListener('mouseleave', () => { isButtonPressedMode = false; });
                // 适配手机端按钮触控
                triggerBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isButtonPressedMode = true; });
                triggerBtn.addEventListener('touchend', () => { isButtonPressedMode = false; });
            }

            let container = document.getElementById('canvas-holder');
            let w = container.offsetWidth || window.innerWidth;
            let h = container.offsetHeight || 450;
            
            let canvas = createCanvas(w, h);
            canvas.parent('canvas-holder'); 

            initTreeLayers();
        }

        function initTreeLayers() {
            let isMobile = width < 500;
            let horizonY = height * 0.72; 
            
            let scaleFactor = 1.0;
            if (isMobile) {
                scaleFactor = map(width, 320, 500, 0.58, 0.82); 
            }

            let vScale = 1.0;
            if (height < 500) {
                vScale = map(height, 350, 500, 0.65, 0.95);
            }

            treeLayers = [
                { 
                    layerIdx: 0,
                    topBaseY: horizonY * 0.12 * vScale, topWidthX: 20 * scaleFactor,
                    bottomBaseY: horizonY * 0.36 * vScale, bottomWidthX: 110 * scaleFactor, 
                    count: 18,
                    texts: ["returning light", "born in silence", "turning", "Christmas"] 
                },
                { 
                    layerIdx: 1,
                    topBaseY: horizonY * 0.26 * vScale, topWidthX: 20 * scaleFactor,
                    bottomBaseY: horizonY * 0.64 * vScale, bottomWidthX: 180 * scaleFactor, 
                    count: 26, 
                    texts: ["Sol Invictus", "carries a seed", "born in silence", "The Magi"] 
                },
                { 
                    layerIdx: 2,
                    topBaseY: horizonY * 0.46 * vScale, topWidthX: 20 * scaleFactor,
                    bottomBaseY: horizonY * 1.0 * vScale, bottomWidthX: 250 * scaleFactor, 
                    count: 36, 
                    texts: ["Sol Invictus", "carries a seed", "The Magi", "to the world", "Christmas", "Letters", "Dance has come"] 
                }
            ];

            for (let layer of treeLayers) {
                layer.lines = [];
                for (let i = 0; i < layer.count; i++) {
                    let basePhase = map(i, 0, layer.count, 0, TWO_PI); 
                    layer.lines.push({
                        basePhase: basePhase,
                        text: random(layer.texts),
                        textPos: random(0.55, 0.88), 
                        textRot: random(-0.2, 0.2)   
                    });
                }
            }
        }

        function draw() {
            // 合并判断：鼠标在画布按下 OR 长按了 Trigger Velocity 按钮
            if (mouseIsPressed || isButtonPressedMode) {
                angleVel = lerp(angleVel, maxVel, 0.04); 
                if (random(1) < 0.75) triggerParticles();
                
                if(hintBox && !hintBox.classList.contains('active')) {
                    hintBox.classList.add('active');
                    hintText.innerText = "[ 状态: 物理引擎加速中... ]";
                }
            } else {
                angleVel *= friction; 
                
                if(hintBox && hintBox.classList.contains('active')) {
                    hintBox.classList.remove('active');
                    hintText.innerText = "[ 提示: 长按鼠标/触摸屏幕以激活加速旋转 ]";
                }
            }
            angle += angleVel;

            if (!mouseIsPressed && !isButtonPressedMode && angleVel < 0.005 && random(1) < 0.15) {
                triggerParticles();
            }

            dynamicBend = lerp(dynamicBend, angleVel, 0.1);

            background(243, 240, 230);
            
            let cx = width / 2;
            let horizonY = height * 0.72; 
            if (treeLayers.length > 0) {
                horizonY = treeLayers[2].bottomBaseY;
            }

            stroke(30, 30, 30);
            strokeWeight(width < 500 ? 14 : 22); 
            let trunkLength = (height < 500) ? height * 0.12 : height * 0.18;
            line(cx, horizonY, cx, horizonY + trunkLength);
            
            for (let l = 0; l < treeLayers.length; l++) {
                let layer = treeLayers[l];
                let lagAmount = dynamicBend * 36.0; 

                for (let lineObj of layer.lines) {
                    let topPhase = lineObj.basePhase + angle;
                    let tailPhase = topPhase - lagAmount; 
                    if (sin(tailPhase) < 0) {
                        drawPerLayerPerfectCurve(cx, layer, lineObj, topPhase, lagAmount, true); 
                    }
                }
                
                for (let lineObj of layer.lines) {
                    let topPhase = lineObj.basePhase + angle;
                    let tailPhase = topPhase - lagAmount; 
                    if (sin(tailPhase) >= 0) {
                        drawPerLayerPerfectCurve(cx, layer, lineObj, topPhase, lagAmount, false);
                    }
                }
                
                drawConeApex(cx, layer.topBaseY);
            }

            updateAndDrawParticles();
        }

        function drawPerLayerPerfectCurve(cx, layer, lineObj, topPhase, lagAmount, isBack) {
            let startX = cx + cos(topPhase) * layer.topWidthX;
            let startY = layer.topBaseY;
            let tailPhase = topPhase - lagAmount;
            let endX = cx + cos(tailPhase) * layer.bottomWidthX;
            let endY = layer.bottomBaseY;

            let ctrlX1, ctrlY1, ctrlX2, ctrlY2;
            let tBend = map(dynamicBend, 0, maxVel, 0, 1, true);
            let targetCtrlX1, targetCtrlX2;
            
            if (layer.layerIdx === 0) {
                let leadPhase1 = topPhase - lagAmount * 0.22;
                targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.45; 
                let leadPhase2 = topPhase - lagAmount * 0.6;
                targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.58;
            } 
            else if (layer.layerIdx === 1) {
                let leadPhase1 = topPhase - lagAmount * 0.15;
                targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.36;
                let leadPhase2 = topPhase - lagAmount * 0.65;
                targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.64;
            } 
            else {
                let leadPhase1 = topPhase - lagAmount * 0.12;
                targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.32; 
                let leadPhase2 = topPhase - lagAmount * 0.72;
                targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.72; 
            }

            ctrlX1 = lerp(lerp(startX, endX, 0.33), targetCtrlX1, tBend);
            ctrlY1 = startY + (endY - startY) * 0.33;
            ctrlX2 = lerp(lerp(startX, endX, 0.66), targetCtrlX2, tBend);
            ctrlY2 = startY + (endY - startY) * 0.66;

            if (isBack) {
                stroke(55, 100, 200, 55);  
                strokeWeight(1.0);
            } else {
                stroke(35, 90, 220, 180);  
                strokeWeight(width < 500 ? 1.3 : 1.8);
            }
            noFill();
            
            bezier(startX, startY, ctrlX1, ctrlY1, ctrlX2, ctrlY2, endX, endY);
            
            let t = lineObj.textPos;
            let paperX = bezierPoint(startX, ctrlX1, ctrlX2, endX, t);
            let paperY = bezierPoint(startY, ctrlY1, ctrlY2, endY, t);
            
            drawNewspaperTag(paperX, paperY, lineObj.text, lineObj.textRot + (angleVel * 4.5), isBack ? 85 : 230);
        }

        function triggerParticles() {
            let layerIndex = floor(random(treeLayers.length));
            let layer = treeLayers[layerIndex];
            let lineObj = random(layer.lines);
            
            particles.push({
                layerIndex: layerIndex,
                basePhase: lineObj.basePhase,
                slideProgress: 0,          
                slideSpeed: random(0.015, 0.03), 
                isLaunched: false,         
                pos: createVector(0, 0),   
                vel: createVector(0, 0),   
                alpha: 255,
                size: random(3, 4.5)
            });
        }

        function updateAndDrawParticles() {
            let cx = width / 2;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                let layer = treeLayers[p.layerIndex];

                let topPhase = p.basePhase + angle;
                let lagAmount = dynamicBend * 35.0; 
                let tailPhase = topPhase - lagAmount;

                let startX = cx + cos(topPhase) * layer.topWidthX;
                let startY = layer.topBaseY;
                let endX = cx + cos(tailPhase) * layer.bottomWidthX;
                let endY = layer.bottomBaseY;
                
                let targetCtrlX1, targetCtrlX2;
                if (layer.layerIdx === 0) {
                    let leadPhase1 = topPhase - lagAmount * 0.22;
                    targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.45;
                    let leadPhase2 = topPhase - lagAmount * 0.6;
                    targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.58;
                } else if (layer.layerIdx === 1) {
                    let leadPhase1 = topPhase - lagAmount * 0.15;
                    targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.36;
                    let leadPhase2 = topPhase - lagAmount * 0.65;
                    targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.64;
                } else {
                    let leadPhase1 = topPhase - lagAmount * 0.12;
                    targetCtrlX1 = cx + cos(leadPhase1) * layer.bottomWidthX * 0.32;
                    let leadPhase2 = topPhase - lagAmount * 0.72;
                    targetCtrlX2 = cx + cos(leadPhase2) * layer.bottomWidthX * 0.72;
                }

                let tBend = map(dynamicBend, 0, maxVel, 0, 1, true);
                let ctrlX1 = lerp(lerp(startX, endX, 0.33), targetCtrlX1, tBend);
                let ctrlY1 = startY + (endY - startY) * 0.33;
                let ctrlX2 = lerp(lerp(startX, endX, 0.66), targetCtrlX2, tBend);
                let ctrlY2 = startY + (endY - startY) * 0.66;

                if (!p.isLaunched) {
                    p.slideProgress += p.slideSpeed;
                    p.pos.x = bezierPoint(startX, ctrlX1, ctrlX2, endX, p.slideProgress);
                    p.pos.y = bezierPoint(startY, ctrlY1, ctrlY2, endY, p.slideProgress);

                    if (p.slideProgress >= 1) {
                        p.isLaunched = true;
                        if (dynamicBend > 0.005) {
                            let tangentX = bezierTangent(startX, ctrlX1, ctrlX2, endX, 1);
                            let tangentY = bezierTangent(startY, ctrlY1, ctrlY2, endY, 1);
                            p.vel = createVector(tangentX, tangentY).normalize().mult(angleVel * 135 + random(1, 2.5));
                        } else {
                            p.vel = createVector(0, random(1, 2)); 
                        }
                    }
                } else {
                    p.pos.add(p.vel);
                    p.vel.y += 0.2; 
                    if (dynamicBend > 0.005) p.vel.mult(0.97); 
                    p.alpha -= 6;     
                }

                noStroke();
                fill(70, 135, 245, p.alpha);
                ellipse(p.pos.x, p.pos.y, p.size);
                fill(70, 135, 245, p.alpha * 0.3);
                ellipse(p.pos.x - p.vel.x * 0.35, p.pos.y - p.vel.y * 0.35, p.size * 0.7);

                if (p.alpha <= 0 || p.pos.y > height) particles.splice(i, 1);
            }
        }

        function drawConeApex(x, y) {
            push();
            noStroke();
            fill(35, 35, 35); 
            let size = width < 500 ? 18 : 28;
            triangle(x, y - 25, x - size, y + 1, x + size, y + 1);
            stroke(90, 90, 90, 120);
            strokeWeight(1);
            for(let i=0; i<8; i++) {
                line(random(x-20, x+20), y, x, y-25);
            }
            pop();
        }

        function drawNewspaperTag(x, y, txt, localRot, alphaValue) {
            push();
            translate(x, y);
            rotate(localRot);
            rectMode(CENTER);
            noStroke();
            fill(252, 252, 248, alphaValue);
            
            let isMobile = width < 500;
            textSize(isMobile ? 8.5 : 10.5);
            
            let txtWidth = textWidth(txt) + (isMobile ? 8 : 14);
            rect(0, 0, txtWidth, isMobile ? 14 : 18);
            fill(40, 40, 45, alphaValue);
            textFont('Courier New');
            textAlign(CENTER, CENTER);
            text(txt, 0, -1);
            stroke(200, alphaValue * 0.6);
            strokeWeight(0.5);
            
            let h = isMobile ? 6 : 8;
            line(-txtWidth/2, -h, -txtWidth/2, h);
            line(txtWidth/2, -h, txtWidth/2, h);
            pop();
        }

        function windowResized() {
            let container = document.getElementById('canvas-holder');
            resizeCanvas(container.offsetWidth, container.offsetHeight);
            initTreeLayers();
        }
    </script>
</body>
